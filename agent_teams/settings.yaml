# Agent Teams Configuration
proxy:
  base_url: "http://127.0.0.1:8317"
  api_key: "agent-teams-key-2026"
  timeout: 300

# Model preferences per agent role (tried in order; first available wins)
agents:
  # -- General --
  coordinator:
    models: ["claude-sonnet-4-6", "claude-sonnet-4-5-20250929", "gemini-2.5-flash"]
    temperature: 0.3
  architect:
    models: ["claude-opus-4-6", "claude-opus-4-5-20251101", "gemini-3-pro-preview"]
    temperature: 0.4
  writer:
    models: ["gpt-5.4", "gpt-5.3-codex", "claude-sonnet-4-5-20250929"]
    temperature: 0.7
  coder:
    models: ["claude-sonnet-4-6", "claude-sonnet-4-5-20250929", "gpt-5.4"]
    temperature: 0.2
  reviewer:
    models: ["gemini-3-pro-preview", "gemini-2.5-pro", "claude-opus-4-6"]
    temperature: 0.3
  researcher:
    models: ["gemini-2.5-flash", "gemini-3-flash-preview", "gemini-2.5-pro"]
    temperature: 0.3

  # -- Publishing (writing) specialists --
  outline_architect:
    models: ["claude-opus-4-6", "claude-opus-4-5-20251101", "gemini-3-pro-preview"]
    temperature: 0.3
  content_writer:
    models: ["gpt-5.4", "gpt-5.3-codex", "claude-sonnet-4-5-20250929"]
    temperature: 0.7
  academic_writer:
    models: ["claude-opus-4-6", "claude-sonnet-4-6", "gemini-3-pro-preview"]
    temperature: 0.3
  wechat_writer:
    models: ["gpt-5.4", "claude-sonnet-4-6", "claude-sonnet-4-5-20250929"]
    temperature: 0.8
  content_reviewer:
    models: ["gemini-3-pro-preview", "gemini-2.5-pro", "gemini-3.1-pro-preview"]
    temperature: 0.2
  structure_reviewer:
    models: ["claude-opus-4-6", "gemini-3-pro-preview", "claude-sonnet-4-6"]
    temperature: 0.2
  language_reviewer:
    models: ["gpt-5.4", "claude-sonnet-4-6", "claude-sonnet-4-5-20250929"]
    temperature: 0.4
  figure_generator:
    models: ["gemini-2.5-flash", "gemini-3-flash-preview"]
    temperature: 0.8

  # -- Coding specialists --
  system_designer:
    models: ["claude-opus-4-6", "claude-opus-4-5-20251101"]
    temperature: 0.3
  senior_coder:
    models: ["claude-sonnet-4-6", "claude-sonnet-4-5-20250929"]
    temperature: 0.2
  test_engineer:
    models: ["claude-sonnet-4-6", "gpt-5.4", "gemini-2.5-flash"]
    temperature: 0.2
  code_reviewer:
    models: ["gemini-3-pro-preview", "claude-opus-4-6", "gemini-2.5-pro"]
    temperature: 0.2
  devops_engineer:
    models: ["claude-sonnet-4-6", "gpt-5.4"]
    temperature: 0.2
  doc_writer:
    models: ["gpt-5.4", "claude-sonnet-4-6"]
    temperature: 0.5

imagegen:
  model: "gemini-2.5-flash"
  fallback_models: ["gemini-3-flash-preview", "gemini-2.5-pro"]

output:
  default_dir: "./output"
  stream: true
